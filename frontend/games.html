<!DOCTYPE html>

  <title>Games - Morpheus</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>

      theme: {
        extend: {
          colors: {
            primary: '#76b900',
            'primary-hover': '#5aa700',
            background: '#0f0f0f',
            surface: '#1a1a1a',
            accent: '#2a2a2a',

      }
    }

      <a href="index.html" class="text-xl font-bold text-primary">Morpheus</a>

        <li><a href="chat.html" class="text-white font-medium hover:text-primary">Chat</a></li>
        <li><a href="friends.html" class="text-white font-medium hover:text-primary">Friends</a></li>

        <li><a href="login.html" class="text-white font-medium hover:text-primary">Logout</a></li>
      </ul>
      
      <div class="flex flex-col gap-1 cursor-pointer p-2 md:hidden" onclick="toggleMenu()">

      <a href="games.html" class="block py-4 text-white border-b border-accent">Games</a>

      <h1 class="text-2xl font-bold mb-6 text-white">Games Library</h1>
